services:
  postgres:
    image: postgres:16
    container_name: logoped-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: dariy
      POSTGRES_PASSWORD: logoped
      POSTGRES_DB: logoped
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
